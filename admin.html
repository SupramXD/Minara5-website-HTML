<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minara – Admin Console</title>
  <!-- Google Fonts Outfit and Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* Sleek Editorial Style Theme - Glassmorphic Dark Mode */
    :root {
      --bg-color: #0a0a0c;
      --panel-bg: rgba(18, 18, 24, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --accent: #ccff00; /* Neon Lime Accent Color */
      --accent-muted: rgba(204, 255, 0, 0.15);
      --danger: #ff3b30;
      --success: #34c759;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Page protection: Hidden until authorized */
    body {
      display: none;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* PREMIUM GLOW BACKGROUNDS */
    .glow-bg {
      position: fixed;
      top: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(204, 255, 0, 0.05) 0%, rgba(10, 10, 12, 0) 70%);
      pointer-events: none;
      z-index: -1;
    }

    .glow-bg-2 {
      position: fixed;
      bottom: -10%;
      left: -10%;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, rgba(10, 10, 12, 0) 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* HEADER & NAVIGATION */
    header.admin-header {
      background: rgba(10, 10, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-group img {
      height: 24px;
      filter: invert(1);
    }

    .brand-badge {
      background: var(--accent);
      color: #000;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.5px;
      padding: 3px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .admin-nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .admin-nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .admin-nav-links a:hover, .admin-nav-links a.active {
      color: var(--text-main);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    /* MAIN CONTAINER */
    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 40px;
    }

    /* DASHBOARD TITLE HERO */
    .hero-panel {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .hero-title h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .hero-title p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 5px;
      letter-spacing: 0.5px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 1px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(204, 255, 0, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(204, 255, 0, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(204, 255, 0, 0); }
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.25s ease;
    }

    .stat-card:hover {
      border-color: rgba(204, 255, 0, 0.25);
      transform: translateY(-2px);
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
    }

    .stat-change {
      font-size: 11px;
      font-weight: 700;
      margin-top: 8px;
    }

    .stat-change.up { color: var(--success); }
    .stat-change.down { color: var(--danger); }

    /* CORE SECTIONS LAYOUT */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1.8fr 1.2fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    .console-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 30px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 16px;
      background: var(--accent);
    }

    /* TABLES STYLE */
    .admin-table-container {
      overflow-x: auto;
      width: 100%;
    }

    table.admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 12.5px;
    }

    table.admin-table th {
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 10.5px;
    }

    table.admin-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      vertical-align: middle;
    }

    table.admin-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* BADGES */
    .status-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .status-badge.shipped {
      background: rgba(52, 199, 89, 0.15);
      color: var(--success);
      border: 1px solid rgba(52, 199, 89, 0.25);
    }

    .status-badge.pending {
      background: rgba(255, 159, 10, 0.15);
      color: #ff9f0a;
      border: 1px solid rgba(255, 159, 10, 0.25);
    }

    .status-badge.admin {
      background: var(--accent-muted);
      color: var(--accent);
      border: 1px solid rgba(204, 255, 0, 0.25);
    }

    .status-badge.user {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* BUTTONS & ACTIONS */
    .btn-action {
      background: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-main);
      padding: 6px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 2px;
    }

    .btn-action:hover {
      background: var(--text-main);
      color: #000;
      border-color: var(--text-main);
    }

    .btn-action.accent-btn {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn-action.accent-btn:hover {
      opacity: 0.85;
      box-shadow: 0 0 12px var(--accent-muted);
    }

    .btn-action.danger-btn {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-action.danger-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* FORMS */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text-muted);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      border-radius: 4px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 10px rgba(204, 255, 0, 0.05);
    }

    /* FULL WIDTH WRAPPER */
    .full-width-panel {
      grid-column: 1 / -1;
    }

    /* FOOTER */
    footer.admin-footer {
      background: #000;
      padding: 30px;
      text-align: center;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      border-top: 1px solid var(--border-color);
      margin-top: 100px;
    }

    /* EDIT MODAL GLASSMORPHISM */
    .edit-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: flex-start;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
      overflow-y: auto;
      padding: 40px 0;
    }

    .edit-modal.active {
      display: flex;
      opacity: 1;
    }

    .edit-modal-content {
      background: rgba(18, 18, 24, 0.95);
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      margin: auto;
      padding: 30px;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .edit-modal::-webkit-scrollbar,
    .edit-modal-content::-webkit-scrollbar {
      width: 6px;
    }
    .edit-modal::-webkit-scrollbar-track,
    .edit-modal-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.01);
    }
    .edit-modal::-webkit-scrollbar-thumb,
    .edit-modal-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    .edit-modal::-webkit-scrollbar-thumb:hover,
    .edit-modal-content::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    .edit-modal.active .edit-modal-content {
      transform: scale(1);
    }

    .edit-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .edit-modal-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .edit-modal-close {
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--danger);
      transition: opacity 0.2s;
    }

    .edit-modal-close:hover {
      opacity: 0.8;
    }

    .edit-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 30px;
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
    }

    /* TABS SYSTEM STYLE */
    .admin-tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .tab-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 12px 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tab-btn.active {
      background: var(--accent-muted);
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(204, 255, 0, 0.2);
    }

    .tab-content {
      display: none;
      animation: tabFadeIn 0.4s ease forwards;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    async function fetchSubscribers() {
      const tableBody = document.getElementById("subscribersTableBody");
      const feedCount = document.getElementById("subscribersFeedCount");
      if (!tableBody) return;
      
      try {
          // Self-healing automatic sync of offline subscribers
          const offlineSubs = JSON.parse(localStorage.getItem("minara_offline_subscribers") || "[]");
          if (offlineSubs.length > 0) {
              console.log("Found pending offline subscribers to sync:", offlineSubs.length);
              let syncSuccessCount = 0;
              for (const sub of offlineSubs) {
                  try {
                      await addDoc(collection(db, "subscribers"), {
                          email: sub.email,
                          timestamp: sub.timestamp
                      });
                      syncSuccessCount++;
                  } catch (syncErr) {
                      console.warn("Failed to sync offline subscriber email:", sub.email, syncErr);
                  }
              }
              if (syncSuccessCount > 0) {
                  const remainingSubs = offlineSubs.slice(syncSuccessCount);
                  if (remainingSubs.length === 0) {
                      localStorage.removeItem("minara_offline_subscribers");
                  } else {
                      localStorage.setItem("minara_offline_subscribers", JSON.stringify(remainingSubs));
                  }
                  console.log(`Successfully synced ${syncSuccessCount} offline subscribers to Firestore.`);
              }
          }

          // Fetch live subscribers from Firestore
          const q = query(collection(db, "subscribers"), orderBy("timestamp", "desc"));
          const querySnapshot = await getDocs(q);
          
          let allSubscribers = [];
          querySnapshot.forEach((doc) => {
              const data = doc.data();
              allSubscribers.push({
                  id: doc.id,
                  email: data.email,
                  timestamp: data.timestamp,
                  source: 'firestore'
              });
          });

          // Fetch offline cached subscribers from localStorage
          const currentOfflineSubs = JSON.parse(localStorage.getItem("minara_offline_subscribers") || "[]");
          currentOfflineSubs.forEach((sub, index) => {
              if (!allSubscribers.some(item => item.email.toLowerCase() === sub.email.toLowerCase())) {
                  allSubscribers.push({
                      id: `local_cache_q${index}`,
                      email: sub.email,
                      timestamp: sub.timestamp,
                      source: 'offline'
                  });
              }
          });

          // Sort merged list by timestamp descending
          allSubscribers.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

          if (allSubscribers.length === 0) {
              tableBody.innerHTML = `
                  <tr>
                      <td colspan="4" style="text-align: center; opacity: 0.5; padding: 30px;">No subscribers registered yet.</td>
                  </tr>
              `;
              if (feedCount) feedCount.textContent = "0 Subscribers";
              return;
          }
          
          tableBody.innerHTML = ""; // Clear existing grid items securely
          allSubscribers.forEach((sub) => {
              const date = new Date(sub.timestamp).toLocaleString();
              const isOffline = sub.source === 'offline';
              const badgeClass = isOffline ? 'pending' : 'admin';
              const badgeText = isOffline ? 'PENDING SYNC' : '5% OFF ACTIVE';
              const emailColor = isOffline ? '#ff9f0a' : 'var(--accent)';
              
              const tr = document.createElement('tr');
              
              // Email cell securely built with textContent
              const emailTd = document.createElement('td');
              emailTd.style.fontWeight = 'bold';
              emailTd.style.color = emailColor;
              emailTd.textContent = sub.email;
              
              if (isOffline) {
                  const offlineSpan = document.createElement('span');
                  offlineSpan.style.cssText = "font-size: 8px; font-weight: normal; color: #ff9f0a; border: 1px solid rgba(255, 159, 10, 0.3); padding: 1px 4px; margin-left: 5px; border-radius: 2px;";
                  offlineSpan.textContent = "OFFLINE CACHE";
                  emailTd.appendChild(offlineSpan);
              }
              tr.appendChild(emailTd);
              
              // Date cell
              const dateTd = document.createElement('td');
              dateTd.textContent = date;
              tr.appendChild(dateTd);
              
              // Badge cell
              const badgeTd = document.createElement('td');
              const badgeSpan = document.createElement('span');
              badgeSpan.className = `status-badge ${badgeClass}`;
              badgeSpan.textContent = badgeText;
              badgeTd.appendChild(badgeSpan);
              tr.appendChild(badgeTd);
              
              // ID cell securely built with textContent
              const idTd = document.createElement('td');
              idTd.style.fontFamily = 'monospace';
              idTd.style.opacity = '0.5';
              idTd.textContent = sub.id;
              tr.appendChild(idTd);
              
              tableBody.appendChild(tr);
          });
          if (feedCount) feedCount.textContent = allSubscribers.length + " Active Subscribers";
      } catch (error) {
          console.error("Error fetching subscribers from Firestore:", error);
          
          const offlineSubs = JSON.parse(localStorage.getItem("minara_offline_subscribers") || "[]");
          let mergedSubscribers = [];

                                  localProds[idx] = { ...fp, syncStatus: "synced" };
                                  localUpdated = true;
                              }
                          } else {
                              localProds.push({ ...fp, syncStatus: "synced" });
                              localUpdated = true;
                          }
                      });
                      
                      if (firestoreProds.length > 0) {
                          const cleanedLocalProds = localProds.filter(lp => {
                              if (lp.id === 'leopard-backpack') return true;
                              if (lp.syncStatus === 'pending') return true;
                              
                              const existsInFirestore = firestoreProds.some(fp => fp.id === lp.id);
                              if (!existsInFirestore) {
                                  localUpdated = true;
                                  return false;
                              }
                              return true;
                          });
                          
                          if (localUpdated) {
                              localStorage.setItem("minara_products", JSON.stringify(cleanedLocalProds));
                              products = [
                                  {
                                      id: "leopard-backpack",
                                      nameShort: "",
                                      name: "Léopard Fur Backpack",
                                      price: 749,
                                      retailPrice: 1200,

                                  },

                              ];
                              updated = true;
                          }
                      } else if (localUpdated) {
                          localStorage.setItem("minara_products", JSON.stringify(localProds));
                      }
                  } catch (cacheErr) {
                      console.error("Failed to sync products cache:", cacheErr);
                  }
                  
                  if (updated) {
                      renderTable();
                  }
              } catch (firestoreErr) {
                  console.error("Firestore products background load failed:", firestoreErr);
              }
          }

    const compressImage = function(file, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/webp', quality);
            resolve(dataUrl);
          };
          img.onerror = function(err) { reject(err); };
          img.src = event.target.result;
        };
        reader.onerror = function(err) { reject(err); };
        reader.readAsDataURL(file);
      });
    };

    const compressUrlOrPath = function(urlOrPath, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        if (!urlOrPath) {
          resolve("");
          return;
        }
        if (urlOrPath.startsWith('data:')) {
          resolve(urlOrPath);
          return;
        }
        
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function() {
          try {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/webp', quality);
            resolve(dataUrl);
          } catch (canvasErr) {
            reject(canvasErr);
          }
        };
        img.onerror = function(err) {
          reject(err);
        };
        img.src = urlOrPath;
      });
    };

    window.adjustStock = async function(productId, amount) {
      const stockTd = document.getElementById("stock-level-" + productId);
      if (!stockTd) return;

      let currentStock = parseInt(stockTd.textContent);
      if (isNaN(currentStock)) currentStock = 0;

      const newStock = Math.max(0, currentStock + amount);
      stockTd.textContent = newStock + " units";

      if (window.minaraProducts) {
          const product = window.minaraProducts.find(p => p.id === productId);
          if (product) {
              product.stock = newStock;
              
              try {
                  const localProds = JSON.parse(localStorage.getItem("minara_products") || "[]");
                  const idx = localProds.findIndex(p => p.id === productId);
                  if (idx > -1) {
                      localProds[idx].stock = newStock;
                  } else if (productId !== 'leopard-backpack') {
                      localProds.push({ ...product, stock: newStock });
                  }
                  localStorage.setItem("minara_products", JSON.stringify(localProds));
              } catch (err) {}
              
              if (window.db && window.dbDoc && window.dbUpdateDoc && productId !== 'leopard-backpack') {
                  try {
                      await window.dbUpdateDoc(window.dbDoc(window.db, "products", productId), {
                          stock: newStock
                      });
                  } catch (dbErr) {}
              }
          }
      }

      const statsEl = document.getElementById("inventoryFulfillmentStats");
      if (statsEl) {
          statsEl.textContent = "Stock Level Adjusted ✓";
      }
    };

                logoMobileSpawn: data.logoMobileSpawn !== undefined ? Number(data.logoMobileSpawn) : -50,
                logoMobileStick: data.logoMobileStick !== undefined ? Number(data.logoMobileStick) : 0,
                logoMobileX: data.logoMobileX !== undefined ? Number(data.logoMobileX) : -50,
                showGiftsButton: data.showGiftsButton !== false
              };
              localStorage.setItem("minara_hero_settings", JSON.stringify(liveSettings));
              populateFields(liveSettings);
            }
          } catch (err) {
            console.warn("Failed to fetch live hero settings:", err);
          }
        }
      }, 0);
    };

    window.handleSaveHeroSettings = async function(e) {
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn ? submitBtn.innerHTML : "";
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = "PUBLISHING HERO...";
      }

      const leftImageText = document.getElementById("heroLeftImage").value.trim();
      const rightImageText = document.getElementById("heroRightImage").value.trim();
      const mobileImageText = document.getElementById("heroMobileImage").value.trim();

      const leftFile = document.getElementById("heroLeftFile").files[0];
      const rightFile = document.getElementById("heroRightFile").files[0];
      const mobileFile = document.getElementById("heroMobileFile").files[0];

      let leftImage = leftImageText || "test3.avif";
      let rightImage = rightImageText || "number23.avif";
      let mobileImage = mobileImageText || "test3 mobile.avif";

      try {
        if (leftFile) {
          leftImage = await compressImage(leftFile, 1200, 0.70);
        } else if (leftImageText && !leftImageText.startsWith("data:")) {
          try {
            leftImage = await compressUrlOrPath(leftImageText, 1200, 0.70);
          } catch (ex) {}
        }
        
        if (rightFile) {
          rightImage = await compressImage(rightFile, 1200, 0.70);
        } else if (rightImageText && !rightImageText.startsWith("data:")) {
          try {
            rightImage = await compressUrlOrPath(rightImageText, 1200, 0.70);
          } catch (ex) {}
        }

        if (mobileFile) {
          mobileImage = await compressImage(mobileFile, 800, 0.65);
        } else if (mobileImageText && !mobileImageText.startsWith("data:")) {
          try {
            mobileImage = await compressUrlOrPath(mobileImageText, 800, 0.65);
          } catch (ex) {}
        }
      } catch (err) {
        console.error("Error compressing hero image:", err);
      }

      const settingsData = {
        leftImage: leftImage,
        rightImage: rightImage,
        mobileImage: mobileImage,
        leftFlex: parseFloat(document.getElementById("heroLeftFlex").value),
        leftScale: parseFloat(document.getElementById("heroLeftScale").value),
        leftX: parseInt(document.getElementById("heroLeftX").value),
        leftY: parseInt(document.getElementById("heroLeftY").value),
        rightScale: parseFloat(document.getElementById("heroRightScale").value),
        rightX: parseInt(document.getElementById("heroRightX").value),
        rightY: parseInt(document.getElementById("heroRightY").value),
        desktopHeight: document.getElementById("heroDesktopHeight").value,
        mobileHeight: document.getElementById("heroMobileHeight").value,
        mobileScale: parseFloat(document.getElementById("heroMobileScale").value),
        mobileX: parseInt(document.getElementById("heroMobileX").value),
        mobileY: parseInt(document.getElementById("heroMobileY").value),
        logoDesktopSpawn: parseInt(document.getElementById("logoDesktopSpawn").value),
        logoDesktopStick: parseInt(document.getElementById("logoDesktopStick").value),
        logoDesktopX: parseInt(document.getElementById("logoDesktopX").value),
        logoMobileSpawn: parseInt(document.getElementById("logoMobileSpawn").value),
        logoMobileStick: parseInt(document.getElementById("logoMobileStick").value),
        logoMobileX: parseInt(document.getElementById("logoMobileX").value),
        showGiftsButton: document.getElementById("heroShowGiftsButton").checked,
        timestamp: new Date().toISOString()
      };

      localStorage.setItem("minara_hero_settings", JSON.stringify(settingsData));

      let firestoreSuccess = false;
      let errorMsg = "";

      if (window.db && window.dbDoc && window.dbSetDoc) {
        try {
          await window.dbSetDoc(window.dbDoc(window.db, "settings", "hero"), settingsData);
          firestoreSuccess = true;
        } catch (dbErr) {
          errorMsg = dbErr.message || dbErr;
          console.error("Firestore hero settings save failed:", dbErr);
        }
      }

      document.getElementById("heroLeftFile").value = "";
      document.getElementById("heroRightFile").value = "";
      document.getElementById("heroMobileFile").value = "";

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }

      if (firestoreSuccess) {
        alert("Success! Hero section settings published and synchronized.");
      } else {
        alert("Warning: Hero settings saved locally, but failed to sync online.\nError: " + errorMsg);
      }

      const previewL = document.getElementById("previewImgL");
      if (previewL) previewL.src = leftImage;
      const previewR = document.getElementById("previewImgR");
      if (previewR) previewR.src = rightImage;
      const previewM = document.getElementById("previewImgMobile");
      if (previewM) previewM.src = mobileImage;

      window.updateHeroPreview();
    };
  </script>

  <script type="module" src="header.js"></script>
</body>
</html>
